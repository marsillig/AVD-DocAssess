<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">AVD-Blueprint sanitized dry-run report viewport</title>
  <desc id="desc">Sanitized preview of the AVD-Blueprint HTML report showing the hero banner, summary cards, architecture map, and collapsible inventory sections.</desc>
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="#f8fafc"/>
  <rect x="44" y="34" width="1352" height="148" rx="18" fill="url(#hero)" stroke="#dbe5ef" filter="url(#shadow)"/>
  <text x="78" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="800" fill="#0f172a">contoso.example</text>
  <circle cx="356" cy="84" r="5" fill="#65a30d"/>
  <text x="78" y="122" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#64748b">Azure Virtual Desktop Deployment Report</text>
  <rect x="1194" y="52" width="92" height="30" rx="15" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="1214" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#334155">Export PDF</text>
  <rect x="1240" y="82" width="120" height="78" rx="16" fill="url(#mark)"/>
  <text x="1272" y="124" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">AVD</text>
  <text x="1260" y="145" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" fill="#e0f2fe" letter-spacing="1.8">DOCUMENT</text>

  <g transform="translate(44,202)">
    <rect width="1352" height="70" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
    <g font-family="Inter, Segoe UI, Arial, sans-serif">
      <text x="24" y="24" font-size="10" font-weight="800" fill="#64748b">GENERATED</text>
      <text x="24" y="48" font-size="14" font-weight="700" fill="#0f172a">2026-05-20 14:30 UTC</text>
      <text x="292" y="24" font-size="10" font-weight="800" fill="#64748b">SUBSCRIPTION</text>
      <text x="292" y="48" font-size="14" font-weight="700" fill="#0f172a">Customer AVD Subscription</text>
      <text x="560" y="24" font-size="10" font-weight="800" fill="#64748b">SUBSCRIPTION ID</text>
      <text x="560" y="48" font-size="14" font-weight="700" fill="#0f172a">00000000-0000-0000-0000-000000000000</text>
      <text x="880" y="24" font-size="10" font-weight="800" fill="#64748b">TENANT</text>
      <text x="880" y="48" font-size="14" font-weight="700" fill="#0f172a">contoso.example</text>
      <text x="1110" y="24" font-size="10" font-weight="800" fill="#64748b">SCOPE</text>
      <text x="1110" y="48" font-size="14" font-weight="700" fill="#0f172a">Subscription</text>
    </g>
  </g>

  <rect x="44" y="294" width="1352" height="170" rx="18" fill="#ffffff" stroke="#dbe5ef" filter="url(#shadow)"/>
  <text x="78" y="336" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Executive summary</text>
  <g transform="translate(78,356)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <g>
      <rect width="194" height="74" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
      <text x="16" y="42" font-size="34" font-weight="800" fill="#2563eb">2</text>
      <text x="16" y="60" font-size="11" font-weight="800" fill="#64748b">HOST POOLS</text>
    </g>
    <g transform="translate(214,0)">
      <rect width="194" height="74" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
      <text x="16" y="42" font-size="34" font-weight="800" fill="#2563eb">8</text>
      <text x="16" y="60" font-size="11" font-weight="800" fill="#64748b">SESSION HOSTS</text>
    </g>
    <g transform="translate(428,0)">
      <rect width="194" height="74" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
      <text x="16" y="42" font-size="34" font-weight="800" fill="#2563eb">3</text>
      <text x="16" y="60" font-size="11" font-weight="800" fill="#64748b">APP GROUPS</text>
    </g>
    <g transform="translate(642,0)">
      <rect width="194" height="74" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
      <text x="16" y="42" font-size="34" font-weight="800" fill="#2563eb">1</text>
      <text x="16" y="60" font-size="11" font-weight="800" fill="#64748b">WORKSPACES</text>
    </g>
    <g transform="translate(856,0)">
      <rect width="194" height="74" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
      <text x="16" y="42" font-size="34" font-weight="800" fill="#2563eb">4</text>
      <text x="16" y="60" font-size="11" font-weight="800" fill="#64748b">VNETS</text>
    </g>
    <g transform="translate(1070,0)">
      <rect width="194" height="74" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
      <text x="16" y="42" font-size="34" font-weight="800" fill="#2563eb">42</text>
      <text x="16" y="60" font-size="11" font-weight="800" fill="#64748b">IAM ASSIGNMENTS</text>
    </g>
  </g>

  <rect x="44" y="486" width="1352" height="300" rx="18" fill="#ffffff" stroke="#dbe5ef" filter="url(#shadow)"/>
  <text x="78" y="528" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f172a">Architecture dependency map</text>
  <rect x="78" y="548" width="1284" height="210" rx="18" fill="#ffffff" stroke="#dbe5ef"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="104" y="578" width="375" height="70" rx="14" fill="#fffbeb" stroke="#fde68a"/>
    <text x="124" y="604" font-size="14" font-weight="800" fill="#0f172a">🔐 Identity / IAM</text>
