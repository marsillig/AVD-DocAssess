    <rect x="532" y="578" width="375" height="70" rx="14" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="552" y="604" font-size="14" font-weight="800" fill="#0f172a">🖥 AVD control plane</text>
    <text x="552" y="628" font-size="12" fill="#334155">Host pools • app groups • workspace</text>
    <rect x="960" y="578" width="375" height="70" rx="14" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text x="980" y="604" font-size="14" font-weight="800" fill="#0f172a">📊 Monitoring</text>
    <text x="980" y="628" font-size="12" fill="#334155">Diagnostics configured • Log Analytics</text>
    <text x="708" y="675" font-size="24" font-weight="900" fill="#2563eb">↓</text>
    <rect x="396" y="690" width="648" height="44" rx="14" fill="#ecfeff" stroke="#67e8f9"/>
    <text x="418" y="718" font-size="14" font-weight="800" fill="#0f172a">⚙ Session host compute</text>
    <text x="620" y="718" font-size="12" fill="#334155">VMs • NICs • host pool registration</text>
  </g>

  <g transform="translate(44,808)" font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect width="430" height="58" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
    <text x="22" y="36" font-size="16" font-weight="800" fill="#1e3a8a">+ Host pools</text>
    <rect x="462" width="430" height="58" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
    <text x="484" y="36" font-size="16" font-weight="800" fill="#1e3a8a">+ Networking</text>
    <rect x="924" width="430" height="58" rx="14" fill="#ffffff" stroke="#dbe5ef"/>
    <text x="946" y="36" font-size="16" font-weight="800" fill="#1e3a8a">+ IAM access summary</text>
